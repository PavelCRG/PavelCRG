name: Generate Snake

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:
  workflow_run:
    workflows: ["Update README Stats"]
    types: [completed]
    branches: [main]

concurrency:
  group: snake-${{ github.repository }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  generate:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Generate snake from contribution graph
        uses: Platane/snk@v3
        with:
          github_user_name: PavelCRG
          github_token: ${{ secrets.GITHUB_TOKEN }}
          outputs: |
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: Prepare snake file
        run: |
          mkdir -p snake-output
          cp dist/github-contribution-grid-snake-dark.svg snake-output/snake.svg

      - name: Commit snake
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update contribution snake"
          file_pattern: snake-output/snake.svg

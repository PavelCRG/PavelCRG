name: Generate Snake

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/snake.yml"
  workflow_dispatch:
  schedule:
    - cron: "0 */12 * * *"

concurrency:
  group: snake-${{ github.repository }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate snake
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
            dist/github-contribution-grid-snake-light.svg?palette=github-light

      - name: Prepare snake files
        run: |
          mkdir -p snake-output
          cp dist/github-contribution-grid-snake-dark.svg snake-output/snake.svg
          cp dist/github-contribution-grid-snake-light.svg snake-output/snake-light.svg
          ls -la snake-output/

      - name: Commit and push snake
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main
          git add snake-output/snake.svg snake-output/snake-light.svg
          if git diff --staged --quiet; then
            echo "Snake unchanged, skip commit"
            exit 0
          fi
          git commit -m "chore: update contribution snake [skip ci]"
          git push origin HEAD:main

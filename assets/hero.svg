  </defs>
  <rect width="850" height="200" rx="14" fill="url(#bg)"/>
  <rect width="850" height="200" rx="14" fill="url(#grid)" opacity="0.45"/>
  <rect x="0.5" y="0.5" width="849" height="199" rx="13.5" fill="none" stroke="#30363d"/>
  <rect x="40" y="44" width="44" height="3" rx="1.5" fill="url(#lime)"/>

  <text x="40" y="108" fill="#F2F2F2" font-family="Segoe UI, system-ui, sans-serif" font-size="52" font-weight="700" letter-spacing="-1.5">Pavel</text>
  <text x="40" y="138" fill="#8b949e" font-family="Segoe UI, system-ui, sans-serif" font-size="15" font-weight="400">Clean interfaces · solid backends · software that ships</text>
  <text x="40" y="168" fill="#58a6ff" font-family="ui-monospace, Consolas, monospace" font-size="13" font-weight="500">pavelcrg.netlify.app</text>
